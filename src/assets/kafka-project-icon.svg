<?xml version="1.0" standalone="no"?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" id="project-icon">
            <defs>
                <!-- Outer Glow Filter -->
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="8" result="blur"/>
                    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                </filter>
                
                <!-- Drop Shadow -->
                <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
                    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
                </filter>

                <!-- Blueprint Grid Pattern -->
                <pattern id="blueprint" width="32" height="32" patternUnits="userSpaceOnUse">
                    <rect width="32" height="32" fill="none"/>
                    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-opacity="0.6"/>
                    <circle cx="0" cy="0" r="1.5" fill="#334155"/>
                </pattern>

                <!-- Stored Data Pattern -->
                <pattern id="records" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
                    <line x1="0" y1="5" x2="10" y2="5" stroke="#334155" stroke-width="2"/>
                </pattern>
            </defs>

            <!-- Base App Icon Shape -->
            <rect width="512" height="512" rx="112" fill="#0b1120"/>
            <rect width="512" height="512" rx="112" fill="url(#blueprint)"/>
            
            <!-- Inner subtle border -->
            <rect width="508" height="508" x="2" y="2" rx="110" fill="none" stroke="#1e293b" stroke-width="4"/>

            <g filter="url(#shadow)">
                
                <!-- THE KAFKA ARMS (PUB/SUB STREAMS) -->
                <!-- Top Arm: Publish Stream (Inbound) -->
                <line x1="390" y1="110" x2="220" y2="240" stroke="#06b6d4" stroke-width="44" stroke-linecap="round"/>
                
                <!-- Bottom Arm: Subscribe Stream (Outbound) -->
                <line x1="220" y1="272" x2="390" y2="402" stroke="#6366f1" stroke-width="44" stroke-linecap="round"/>

                <!-- THE LOG (VERTICAL PARTITION BLOCKS) -->
                <!-- Block 1: Oldest records (Top) -->
                <rect x="110" y="104" width="80" height="48" rx="10" fill="url(#records)" stroke="#1e293b" stroke-width="4"/>
                
                <!-- Block 2: Older records -->
                <rect x="110" y="168" width="80" height="48" rx="10" fill="url(#records)" stroke="#1e293b" stroke-width="4"/>
                
                <!-- Block 4: Future capacity (Blueprint/Dashed) -->
                <rect x="110" y="296" width="80" height="48" rx="10" fill="none" stroke="#475569" stroke-width="3" stroke-dasharray="8 6">
                    <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1s" repeatCount="indefinite"/>
                </rect>
                <path d="M 145 320 L 155 320 M 150 315 L 150 325" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
                
                <!-- Block 5: Future capacity (Blueprint/Dashed) -->
                <rect x="110" y="360" width="80" height="48" rx="10" fill="none" stroke="#475569" stroke-width="3" stroke-dasharray="8 6">
                    <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1s" repeatCount="indefinite"/>
                </rect>
                <path d="M 145 384 L 155 384 M 150 379 L 150 389" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

                <!-- Block 3: Active Append Block (Glowing) -->
                <rect x="108" y="230" width="84" height="52" rx="12" fill="#082f49" stroke="#0ea5e9" stroke-width="4" filter="url(#glow)"/>
                
                <!-- "From Scratch" Terminal Prompt inside Active Block -->
                <g stroke="#ffffff" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Chevron > -->
                    <path d="M 134 246 L 142 254 L 134 262" stroke-width="3"/>
                    <!-- Blinking Cursor _ -->
                    <path d="M 148 264 L 160 264" stroke-width="3">
                        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
                    </path>
                </g>
                
            </g>

            <!-- ANIMATED DATA PACKETS -->
            <g>
                <!-- Publish Stream Packets (Flowing IN) -->
                <circle r="7" fill="#ffffff" filter="url(#glow)">
                    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 390 110 L 220 240" begin="0s"/>
                </circle>
                <circle r="7" fill="#ffffff" filter="url(#glow)">
                    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 390 110 L 220 240" begin="0.5s"/>
                </circle>
                <circle r="7" fill="#ffffff" filter="url(#glow)">
                    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 390 110 L 220 240" begin="1.0s"/>
                </circle>

                <!-- Subscribe Stream Packets (Flowing OUT) -->
                <circle r="7" fill="#ffffff" filter="url(#glow)">
                    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 220 272 L 390 402" begin="0s"/>
                </circle>
                <circle r="7" fill="#ffffff" filter="url(#glow)">
                    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 220 272 L 390 402" begin="0.5s"/>
                </circle>
                <circle r="7" fill="#ffffff" filter="url(#glow)">
                    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 220 272 L 390 402" begin="1.0s"/>
                </circle>
            </g>
            
        </svg>