<?xml version="1.0" standalone="no"?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" id="project-icon">
            <defs>
                <!-- Outer Glow Filter -->
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur"/>
                    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                </filter>
                
                <!-- Heavy Glow -->
                <filter id="glow-heavy" x="-30%" y="-30%" width="160%" height="160%">
                    <feGaussianBlur stdDeviation="12" result="blur"/>
                    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                </filter>

                <!-- Drop Shadow -->
                <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
                    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
                </filter>

                <!-- Blueprint Grid Pattern -->
                <pattern id="blueprint" width="32" height="32" patternUnits="userSpaceOnUse">
                    <rect width="32" height="32" fill="none"/>
                    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-opacity="0.6"/>
                    <circle cx="0" cy="0" r="1.5" fill="#334155"/>
                </pattern>

                <!-- Gauge Gradient (Red -> Yellow -> Green) -->
                <linearGradient id="risk-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#ef4444"/>   <!-- High Risk (Red) -->
                    <stop offset="50%" stop-color="#eab308"/>  <!-- Medium Risk (Yellow) -->
                    <stop offset="100%" stop-color="#10b981"/> <!-- Low Risk (Green) -->
                </linearGradient>
            </defs>

            <!-- Base App Icon Shape -->
            <rect width="512" height="512" rx="112" fill="#0b1120"/>
            <rect width="512" height="512" rx="112" fill="url(#blueprint)"/>
            
            <!-- Inner subtle border -->
            <rect width="508" height="508" x="2" y="2" rx="110" fill="none" stroke="#1e293b" stroke-width="4"/>

            <g filter="url(#shadow)">
                
                <!-- THE SHIELD (Risk Management / Security Base) -->
                <path d="M 256 56 L 426 112 L 426 230 C 426 360, 256 456, 256 456 C 256 456, 86 360, 86 230 L 86 112 Z" fill="#0f172a" stroke="#1e293b" stroke-width="8" stroke-linejoin="round"/>
                <!-- Inner Shield Highlight -->
                <path d="M 256 68 L 414 120 L 414 230 C 414 350, 256 440, 256 440 C 256 440, 98 350, 98 230 L 98 120 Z" fill="none" stroke="#334155" stroke-width="2" stroke-linejoin="round"/>

                <!-- NEURAL NETWORK CONNECTIONS -->
                <g stroke="#334155" stroke-width="4" stroke-linecap="round">
                    <!-- Inputs to Hidden Layer -->
                    <line x1="150" y1="340" x2="190" y2="250"/>
                    <line x1="256" y1="340" x2="190" y2="250"/>
                    <line x1="256" y1="340" x2="322" y2="250"/>
                    <line x1="362" y1="340" x2="322" y2="250"/>
                    <!-- Hidden Layer to Output Gauge -->
                    <line x1="190" y1="250" x2="256" y2="170"/>
                    <line x1="322" y1="250" x2="256" y2="170"/>
                    <!-- Hidden Layer Cross Connection -->
                    <line x1="190" y1="250" x2="322" y2="250" stroke-dasharray="6 6" stroke-width="2"/>
                </g>

                <!-- ANIMATED DATA PACKETS (Processing Data) -->
                <g>
                    <!-- Flowing from Inputs -->
                    <circle r="5" fill="#3b82f6" filter="url(#glow)">
                        <animateMotion dur="1.5s" repeatCount="indefinite" path="M 150 340 L 190 250" begin="0s"/>
                    </circle>
                    <circle r="5" fill="#8b5cf6" filter="url(#glow)">
                        <animateMotion dur="1.2s" repeatCount="indefinite" path="M 256 340 L 190 250" begin="0.3s"/>
                    </circle>
                    <circle r="5" fill="#8b5cf6" filter="url(#glow)">
                        <animateMotion dur="1.4s" repeatCount="indefinite" path="M 256 340 L 322 250" begin="0.1s"/>
                    </circle>
                    <circle r="5" fill="#3b82f6" filter="url(#glow)">
                        <animateMotion dur="1.6s" repeatCount="indefinite" path="M 362 340 L 322 250" begin="0.5s"/>
                    </circle>

                    <!-- Flowing to Output -->
                    <circle r="6" fill="#0ea5e9" filter="url(#glow)">
                        <animateMotion dur="1s" repeatCount="indefinite" path="M 190 250 L 256 170" begin="0.8s"/>
                    </circle>
                    <circle r="6" fill="#0ea5e9" filter="url(#glow)">
                        <animateMotion dur="1.1s" repeatCount="indefinite" path="M 322 250 L 256 170" begin="0.9s"/>
                    </circle>
                </g>

                <!-- NEURAL NETWORK NODES -->
                <!-- Hidden Layer Pulse Animations -->
                <circle cx="190" cy="250" r="16" fill="none" stroke="#0ea5e9" stroke-width="3">
                    <animate attributeName="r" values="12; 28" dur="1.5s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="1; 0" dur="1.5s" repeatCount="indefinite"/>
                </circle>
                <circle cx="322" cy="250" r="16" fill="none" stroke="#0ea5e9" stroke-width="3">
                    <animate attributeName="r" values="12; 28" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
                    <animate attributeName="opacity" values="1; 0" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
                </circle>

                <!-- Input Nodes (Raw Data Sources) -->
                <circle cx="150" cy="340" r="16" fill="#1e293b" stroke="#3b82f6" stroke-width="4"/>
                <circle cx="362" cy="340" r="16" fill="#1e293b" stroke="#3b82f6" stroke-width="4"/>
                <!-- Hidden Nodes (Processing) -->
                <circle cx="190" cy="250" r="16" fill="#1e293b" stroke="#0ea5e9" stroke-width="4" filter="url(#glow)"/>
                <circle cx="322" cy="250" r="16" fill="#1e293b" stroke="#0ea5e9" stroke-width="4" filter="url(#glow)"/>

                <!-- Central "From Scratch" Dev Input Node -->
                <rect x="216" y="324" width="80" height="32" rx="8" fill="#080c14" stroke="#8b5cf6" stroke-width="4" filter="url(#glow)"/>
                <g stroke="#ffffff" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M 234 334 L 240 340 L 234 346" stroke-width="2"/>
                    <path d="M 246 348 L 256 348" stroke-width="2">
                        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
                    </path>
                </g>

                <!-- OUTPUT LAYER: CREDIT RISK GAUGE -->
                <g transform="translate(0, -10)">
                    <!-- Gauge Arc Background (Subtle track) -->
                    <path d="M 176 180 A 80 80 0 0 1 336 180" fill="none" stroke="#1e293b" stroke-width="16" stroke-linecap="round"/>
                    
                    <!-- Gauge Arc (Colored Red to Green) -->
                    <path d="M 176 180 A 80 80 0 0 1 336 180" fill="none" stroke="url(#risk-grad)" stroke-width="16" stroke-linecap="round" filter="url(#glow)"/>
                    
                    <!-- Gauge Ticks -->
                    <path d="M 176 160 L 176 150 M 216 110 L 209 103 M 256 100 L 256 90 M 296 110 L 303 103 M 336 160 L 336 150" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>

                    <!-- Animated Needle (Calculating Risk) -->
                    <g transform="translate(256, 180)">
                        <!-- The calculation sweep animation -->
                        <animateTransform attributeName="transform" type="rotate" values="-70; 50; -30; 35; 35" keyTimes="0; 0.25; 0.5; 0.75; 1" dur="3s" repeatCount="indefinite"/>
                            
                        <polygon points="-4,-4 4,-4 0,-65" fill="#ffffff" filter="url(#glow)"/>
                        <circle r="8" fill="#ffffff" stroke="#1e293b" stroke-width="3"/>
                    </g>
                </g>

            </g>
        </svg>